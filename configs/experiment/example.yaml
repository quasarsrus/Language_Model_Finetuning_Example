# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: tiny_shakespeare
  - override /model: tiny_shakespeare
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["tiny_shakespeare", "smolLM-135M"]

seed: 35

trainer:
  min_epochs: 5
  max_epochs: 10
  gradient_clip_val: 1.0

model:
  optimizer:
    lr: 1e-4
    weight_decay: 0.01

  scheduler:
    num_warmup_steps: 42
    num_training_steps: 840
  use_lora: false

data:
  batch_size: 32
  block_size: 128

logger:
  wandb:
    tags: ${tags}
    group: "tiny_shakespeare"
  aim:
    experiment: "tiny_shakespeare"
